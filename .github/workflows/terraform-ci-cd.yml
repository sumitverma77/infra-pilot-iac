name: Terraform CI/CD

on:
  push:
    branches:
      - main
      - stage
  pull_request:
    branches:
      - main
      - stage
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to manage'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - stage
      action:
        description: 'Terraform action'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - plan
          - destroy

permissions:
  contents: read
  pull-requests: write

jobs:
  setup:
    name: Setup & Resolve Env
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set-env.outputs.env_name }}
      action: ${{ steps.set-env.outputs.action }}
    steps:
      - id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env_name=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          else
            if [ "${{ github.ref_name }}" = "main" ]; then
              echo "env_name=prod" >> $GITHUB_OUTPUT
            else
              echo "env_name=stage" >> $GITHUB_OUTPUT
            fi
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "action=plan" >> $GITHUB_OUTPUT
            else
              echo "action=apply" >> $GITHUB_OUTPUT
            fi
          fi

  terraform:
    name: Terraform Execution
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.env_name }}
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Check Formatting
        run: terraform fmt -check

      - name: Initialize Terraform
        run: terraform init -backend-config="key=environments/${{ needs.setup.outputs.env_name }}/terraform.tfstate"

      - name: Validate Terraform
        run: terraform validate

      - name: Run Terraform Plan
        id: plan
        run: terraform plan -var="environment=${{ needs.setup.outputs.env_name }}" -var="aws_region=${{ env.AWS_DEFAULT_REGION }}" -out=tfplan

      - name: Run Terraform Apply
        if: ${{ needs.setup.outputs.action == 'apply' && github.event_name != 'pull_request' }}
        run: terraform apply -auto-approve tfplan

      - name: Run Terraform Destroy
        if: ${{ needs.setup.outputs.action == 'destroy' && github.event_name == 'workflow_dispatch' }}
        run: terraform destroy -auto-approve -var="environment=${{ needs.setup.outputs.env_name }}" -var="aws_region=${{ env.AWS_DEFAULT_REGION }}"
